name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Import macOS signing certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${MACOS_CERTIFICATE_P12_BASE64:-}" ]; then
            echo "macOS signing certificate not configured; app bundles will use ad-hoc signing"
            exit 0
          fi
          keychain="$RUNNER_TEMP/everything-go-signing.keychain-db"
          cert="$RUNNER_TEMP/everything-go-cert.p12"
          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$cert" 2>/dev/null \
            || printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 -D > "$cert"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain"
          security import "$cert" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$keychain"

      - name: Cross-compile binaries (CGO-free, modernc sqlite)
        run: |
          mkdir -p dist
          for target in darwin/arm64 darwin/amd64 linux/arm64 linux/amd64; do
            os=${target%/*}; arch=${target#*/}
            echo "building everything-go-$os-$arch"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -trimpath -ldflags="-s -w" \
              -o "dist/everything-go-$os-$arch" ./cmd/everything-go
          done

      - name: Package macOS app bundles
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          chmod +x scripts/package_macos_app.sh
          version="${GITHUB_REF_NAME#v}"
          sign_identity="${MACOS_CODESIGN_IDENTITY:-"-"}"
          EVERYTHING_GO_CODESIGN_IDENTITY="$sign_identity" EVERYTHING_GO_VERSION="$version" \
            scripts/package_macos_app.sh dist/everything-go-darwin-arm64 arm64 dist/everything-go-darwin-arm64.app.zip
          EVERYTHING_GO_CODESIGN_IDENTITY="$sign_identity" EVERYTHING_GO_VERSION="$version" \
            scripts/package_macos_app.sh dist/everything-go-darwin-amd64 amd64 dist/everything-go-darwin-amd64.app.zip

      - name: Notarize macOS app bundles
        env:
          APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          APPSTORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_P8_BASE64 }}
        run: |
          if [ -z "${APPSTORE_CONNECT_API_KEY_ID:-}" ]; then
            echo "App Store Connect API key not configured; skipping notarization"
            exit 0
          fi
          chmod +x scripts/notarize_macos_app_zip.sh
          scripts/notarize_macos_app_zip.sh dist/everything-go-darwin-arm64.app.zip
          scripts/notarize_macos_app_zip.sh dist/everything-go-darwin-amd64.app.zip

      - name: Finish release assets
        run: |
          cp install.sh dist/install.sh
          (cd dist && shasum -a 256 * > SHA256SUMS)
          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
